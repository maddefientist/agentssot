<div id="cortex-error-bar" class="cortex-error-bar"></div>

<div id="cortex-conn-drawer" class="cortex-drawer">
  <div class="cortex-drawer-inner">
    <div class="cortex-drawer-head">
      <strong>Cortex connection</strong>
      <button id="cortex-conn-close" type="button" aria-label="close">&times;</button>
    </div>
    <p class="cortex-drawer-help">
      Paste your hive API key (starts with <code>ssot_</code>). Stored in this browser
      only. Used as <code>X-API-Key</code> on every cortex page.
    </p>
    <input id="cortex-conn-input" type="password" placeholder="ssot_..." autocomplete="off" />
    <div class="cortex-drawer-actions">
      <button id="cortex-conn-save" type="button">Save &amp; validate</button>
      <button id="cortex-conn-clear" type="button" class="ghost">Clear</button>
    </div>
  </div>
</div>
