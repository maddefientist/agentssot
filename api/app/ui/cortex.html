<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Cortex - Neural Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'JetBrains Mono', 'Fira Code', monospace; overflow: hidden; }

  #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 24px; display: flex; justify-content: space-between; align-items: flex-start;
    background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
    pointer-events: none;
  }
  #hud > * { pointer-events: auto; }

  .hud-title { font-size: 14px; letter-spacing: 2px; color: #8b5cf6; text-transform: uppercase; }
  .hud-subtitle { font-size: 11px; color: #555; margin-top: 4px; }

  .hud-stats { display: flex; gap: 24px; font-size: 12px; }
  .stat { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 9px; letter-spacing: 1px; color: #666; text-transform: uppercase; margin-top: 2px; }
  .stat-principles .stat-value { color: #f59e0b; }
  .stat-models .stat-value { color: #06b6d4; }
  .stat-relationships .stat-value { color: #a855f7; }
  .stat-skills .stat-value { color: #22c55e; }
  .stat-knowledge .stat-value { color: #64748b; }

  .controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; gap: 8px; background: rgba(20,20,30,0.9); border: 1px solid #222; border-radius: 8px; padding: 8px 12px;
  }
  .controls button {
    background: rgba(255,255,255,0.05); border: 1px solid #333; color: #aaa; padding: 6px 14px;
    border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .controls button:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .controls button.active { background: rgba(139,92,246,0.2); border-color: #8b5cf6; color: #c4b5fd; }

  #tooltip {
    position: fixed; z-index: 20; display: none; max-width: 380px;
    background: rgba(15,15,25,0.96); border: 1px solid #333; border-radius: 8px; padding: 14px;
    font-size: 11px; line-height: 1.5; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .tt-type { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
  .tt-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .tt-content { color: #999; font-size: 10px; white-space: pre-line; }
  .tt-meta { margin-top: 8px; display: flex; gap: 12px; font-size: 9px; color: #666; }

  .legend {
    position: fixed; bottom: 70px; right: 20px; z-index: 10;
    font-size: 10px; color: #555; line-height: 2;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #search {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 15;
    background: rgba(15,15,25,0.95); border: 1px solid #333; border-radius: 8px;
    padding: 8px 16px; width: 300px; color: #e0e0e0; font-family: inherit; font-size: 12px;
    outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: #8b5cf6; }
  #search::placeholder { color: #444; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div>
    <div class="hud-title">Hive Cortex</div>
    <div class="hud-subtitle">Neural Memory Map</div>
  </div>
  <div class="hud-stats">
    <div class="stat stat-principles"><div class="stat-value" id="s-prin">0</div><div class="stat-label">Principles</div></div>
    <div class="stat stat-models"><div class="stat-value" id="s-model">0</div><div class="stat-label">Mental Models</div></div>
    <div class="stat stat-relationships"><div class="stat-value" id="s-rel">0</div><div class="stat-label">Relationships</div></div>
    <div class="stat stat-skills"><div class="stat-value" id="s-skill">0</div><div class="stat-label">Skills</div></div>
    <div class="stat stat-knowledge"><div class="stat-value" id="s-know">0</div><div class="stat-label">Knowledge</div></div>
  </div>
</div>

<input type="text" id="search" placeholder="search concepts..." />

<div class="controls">
  <button class="active" data-group="all">All</button>
  <button data-group="principle">Principles</button>
  <button data-group="mental_model">Mental Models</button>
  <button data-group="relationship">Relationships</button>
  <button data-group="skill">Skills</button>
  <button data-scope="global">Global</button>
  <button data-scope="project">Project</button>
  <button data-scope="device">Device</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Principle</div>
  <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Mental Model</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> Relationship</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Skill</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e50"></div> Size = evidence</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.3)"></div> Opacity = confidence</div>
</div>

<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-content" id="tt-content"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<script>
const TYPE_COLORS = {
  principle: { r: 245, g: 158, b: 11 },
  mental_model: { r: 6, g: 182, b: 212 },
  relationship: { r: 168, g: 85, b: 247 },
  skill: { r: 34, g: 197, b: 94 },
};

const SCOPE_RINGS = { global: 0.15, project: 0.55, device: 0.85 };

let concepts = [];
let nodes = [];
let activeGroup = 'all';
let activeScope = null;
let searchTerm = '';
let hoveredNode = null;
let canvas, ctx, W, H, mouse = { x: -999, y: -999 };
let time = 0;

async function loadData() {
  try {
    const resp = await fetch('/cortex/data?namespace=claude-shared');
    const data = await resp.json();
    concepts = data.concepts || [];
    document.getElementById('s-know').textContent = data.knowledge_count || '?';
  } catch (e) {
    console.error('Failed to load concepts:', e);
    concepts = [];
  }

  document.getElementById('s-prin').textContent = concepts.filter(c => c.type === 'principle').length;
  document.getElementById('s-model').textContent = concepts.filter(c => c.type === 'mental_model').length;
  document.getElementById('s-rel').textContent = concepts.filter(c => c.type === 'relationship').length;
  document.getElementById('s-skill').textContent = concepts.filter(c => c.type === 'skill').length;

  buildNodes();
}

function buildNodes() {
  nodes = concepts.map((c, i) => {
    const scopeRing = SCOPE_RINGS[c.scope] || 0.5;
    const angle = (i / concepts.length) * Math.PI * 2 + Math.random() * 0.3;
    const radiusJitter = (Math.random() - 0.5) * 0.15;
    const radius = scopeRing + radiusJitter;

    const col = TYPE_COLORS[c.type] || { r: 100, g: 100, b: 100 };
    const evidenceCount = c.evidence_ids ? c.evidence_ids.length : 1;
    const baseSize = Math.max(3, Math.min(18, 3 + Math.sqrt(evidenceCount) * 2.5));

    return {
      concept: c,
      angle, radius, baseSize,
      size: baseSize,
      color: col,
      opacity: 0.3 + (c.confidence || 0.5) * 0.7,
      x: 0, y: 0,
      vx: (Math.random() - 0.5) * 0.1,
      vy: (Math.random() - 0.5) * 0.1,
      visible: true,
      pulse: Math.random() * Math.PI * 2,
    };
  });
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function updatePositions() {
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) * 0.42;

  for (const n of nodes) {
    const targetX = cx + Math.cos(n.angle) * n.radius * scale;
    const targetY = cy + Math.sin(n.angle) * n.radius * scale;

    n.angle += 0.0002 + Math.sin(time * 0.001 + n.pulse) * 0.0001;

    n.x += (targetX - n.x) * 0.02 + n.vx;
    n.y += (targetY - n.y) * 0.02 + n.vy;
    n.vx *= 0.98;
    n.vy *= 0.98;

    // No mouse physics — nodes just drift naturally, hover to inspect

    const typeMatch = activeGroup === 'all' || n.concept.type === activeGroup;
    const scopeMatch = !activeScope || n.concept.scope === activeScope;
    const searchMatch = !searchTerm || n.concept.title.toLowerCase().includes(searchTerm) ||
                        (n.concept.scope_ref || '').toLowerCase().includes(searchTerm);
    n.visible = typeMatch && scopeMatch && searchMatch;

    n.pulse += 0.02;
    n.size = n.baseSize + Math.sin(n.pulse) * 0.5;
  }
}

function drawConnections() {
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) * 0.42;

  ctx.setLineDash([2, 6]);
  for (const [label, r] of Object.entries(SCOPE_RINGS)) {
    ctx.beginPath();
    ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '9px monospace';
    ctx.fillText(label, cx + r * scale + 6, cy - 4);
  }
  ctx.setLineDash([]);

  const byRef = {};
  for (const n of nodes) {
    if (!n.visible || !n.concept.scope_ref) continue;
    const key = n.concept.scope_ref;
    if (!byRef[key]) byRef[key] = [];
    byRef[key].push(n);
  }

  for (const group of Object.values(byRef)) {
    if (group.length < 2) continue;
    const hub = group[0];
    for (let i = 1; i < group.length; i++) {
      const n = group[i];
      const dx = n.x - hub.x, dy = n.y - hub.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 250) continue;
      ctx.beginPath();
      ctx.moveTo(hub.x, hub.y);
      ctx.lineTo(n.x, n.y);
      ctx.strokeStyle = 'rgba(' + hub.color.r + ',' + hub.color.g + ',' + hub.color.b + ',' + (0.03 + (1 - dist / 250) * 0.06) + ')';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function drawNodes() {
  for (const n of nodes) {
    if (!n.visible) continue;

    const isHovered = n === hoveredNode;
    const alpha = isHovered ? 1.0 : n.opacity;
    const size = isHovered ? n.size * 1.8 : n.size;

    const gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, size * 3);
    gradient.addColorStop(0, 'rgba(' + n.color.r + ',' + n.color.g + ',' + n.color.b + ',' + (alpha * 0.3) + ')');
    gradient.addColorStop(1, 'rgba(' + n.color.r + ',' + n.color.g + ',' + n.color.b + ',0)');
    ctx.beginPath();
    ctx.arc(n.x, n.y, size * 3, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + n.color.r + ',' + n.color.g + ',' + n.color.b + ',' + alpha + ')';
    ctx.fill();

    if (isHovered) {
      ctx.fillStyle = '#fff';
      ctx.font = '11px monospace';
      ctx.fillText(n.concept.title, n.x + size + 8, n.y + 4);
    }
  }
}

function findHovered() {
  let closest = null, closestDist = 30;
  for (const n of nodes) {
    if (!n.visible) continue;
    const dx = n.x - mouse.x, dy = n.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) { closest = n; closestDist = dist; }
  }
  hoveredNode = closest;

  const tooltip = document.getElementById('tooltip');
  if (closest) {
    const c = closest.concept;
    const evidenceCount = c.evidence_ids ? c.evidence_ids.length : 0;

    document.getElementById('tt-type').textContent = c.type.replace('_', ' ');
    document.getElementById('tt-type').style.color = 'rgb(' + closest.color.r + ',' + closest.color.g + ',' + closest.color.b + ')';
    document.getElementById('tt-title').textContent = c.title;
    if (c.type === 'skill') {
      var skillLines = [];
      if (c.trigger) skillLines.push('When: ' + c.trigger);
      if (c.action) skillLines.push('Do: ' + c.action);
      if (c.success_hint) skillLines.push('Verify: ' + c.success_hint);
      document.getElementById('tt-content').textContent = skillLines.length ? skillLines.join('\n') : (c.content ? c.content.substring(0, 200) : 'No preview');
    } else {
      document.getElementById('tt-content').textContent = c.content ? c.content.substring(0, 200) : 'No preview';
    }
    document.getElementById('tt-meta').textContent = 'scope: ' + c.scope + (c.scope_ref ? '/' + c.scope_ref : '') +
      '  |  conf: ' + (c.confidence || 0).toFixed(2) +
      '  |  evidence: ' + evidenceCount +
      '  |  v' + (c.version || 1);

    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(mouse.x + 16, W - 400) + 'px';
    tooltip.style.top = Math.min(mouse.y + 16, H - 200) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
}

function render() {
  time++;
  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.6);
  bg.addColorStop(0, '#0f0f1a');
  bg.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  updatePositions();
  drawConnections();
  drawNodes();
  findHovered();

  requestAnimationFrame(render);
}

canvas = document.getElementById('canvas');
ctx = canvas.getContext('2d');
resize();
window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', function() { mouse.x = -999; mouse.y = -999; });

document.querySelectorAll('.controls button[data-group]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.controls button[data-group]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeGroup = btn.dataset.group;
  });
});
document.querySelectorAll('.controls button[data-scope]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var wasActive = btn.classList.contains('active');
    document.querySelectorAll('.controls button[data-scope]').forEach(function(b) { b.classList.remove('active'); });
    if (!wasActive) { btn.classList.add('active'); activeScope = btn.dataset.scope; }
    else { activeScope = null; }
  });
});

document.getElementById('search').addEventListener('input', function(e) {
  searchTerm = e.target.value.toLowerCase();
});

loadData().then(function() { render(); });
</script>
</body>
</html>
